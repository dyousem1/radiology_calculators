            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .subtitle {
            font-size: 1.1em;
            color: #94a3b8;
        }
        
        .controls {
            background: rgba(255, 255, 255, 0.05);

            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        
        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fbbf24;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select:hover {
            border-color: rgba(251, 191, 36, 0.5);
        }
        
        select:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }
        
        select option {
            background: #1e293b;
            color: white;
        }
        
        .results-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .results-header {
            background: rgba(251, 191, 36, 0.1);
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .results-header h2 {
            color: #fbbf24;
            font-size: 1.3em;
        }
        
        .results-header .info {
            color: #94a3b8;
            font-size: 0.9em;
        }
        
        .rankings-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .rankings-table th {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 20px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .rankings-table th:first-child {
            width: 60px;
            text-align: center;
        }
        
        .rankings-table th:last-child {
            width: 100px;
            text-align: right;
        }
        
        .rankings-table th:nth-child(3) {
            width: 80px;
            text-align: center;
        }
        
        .rankings-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .rankings-table tr:hover {
            background: rgba(251, 191, 36, 0.05);
        }
        
        .rankings-table tr:last-child td {
            border-bottom: none;
        }

            text-align: center;
            font-weight: 700;
            font-size: 1.1em;
        }

        }

        .badge-ir { background: rgba(20, 184, 166, 0.2); color: #2dd4bf; }

            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        
        .badge-overall {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }
        
        .badge-body {
            background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
        }
        
        .badge-nih {

        }

            font-style: italic;
        }

        }

        }

            color: #64748b;
            margin-top: 5px;
        }

            padding: 15px;

    const NIH_EXCLUDED = {"Massachusetts General Hospital (Harvard)":"Harvard affiliate: BRIMR credits grants to hospital","Brigham and Women's Hospital (Harvard)":"Harvard affiliate: BRIMR credits grants to hospital","Beth Israel Deaconess Medical Center (Harvard)":"Harvard affiliate: BRIMR credits grants to hospital","Boston Children's Hospital (Harvard)":"Harvard affiliate: BRIMR credits grants to hospital","Mayo Clinic - Rochester":"Not classified as medical school in NIH/BRIMR","Mayo Clinic - Jacksonville":"Not classified as medical school in NIH/BRIMR","Mayo Clinic - Phoenix":"Not classified as medical school in NIH/BRIMR","Cleveland Clinic":"Combined with Case Western Reserve in BRIMR","Memorial Sloan Kettering Cancer Center":"Classified as hospital, not medical school, in BRIMR","University of Texas MD Anderson Cancer Center":"Classified as hospital, not medical school, in BRIMR"};

    const subspecialtySelect = document.getElementById('subspecialty-select');
    const metricSelect = document.getElementById('metric-select');
    
    subspecialtySelect.addEventListener('change', updateResults);
    metricSelect.addEventListener('change', updateResults);
    
    function formatValue(value, metric) {
        if (value === null || value === undefined) return 'N/A';
        if (metric === 'funding') {
            return '$' + parseInt(value).toLocaleString();
        }
        if (metric === 'papers' || metric === 'citations') {
            return parseInt(value).toLocaleString();
        }
        return parseFloat(value).toFixed(1);
    }
    
    function updateResults() {
        const subspecialty = subspecialtySelect.value;
        let metric = metricSelect.value;
        const resultsContent = document.getElementById('results-content');
        const resultsTitle = document.getElementById('results-title');
        const resultsInfo = document.getElementById('results-info');
        
        // NIH Funding: can be triggered from subspecialty OR metric dropdown
        if (subspecialty === 'NIH Funding' || metric === 'nih_funding') {
            metric = 'funding';
            // Switch to NIH Funding subspecialty data
            var nihSubspecData = DATA['NIH Funding'];
            if (!nihSubspecData) {
                resultsContent.innerHTML = '<div class="no-data"><div class="icon">❌</div><p>No NIH data available</p></div>';
                return;
            }
            
            const badgeClass = 'badge-nih';
            resultsTitle.innerHTML = `Top 25 by NIH Funding <span class="subspecialty-badge ${badgeClass}">BRIMR 2025</span>`;
            resultsInfo.textContent = `${nihSubspecData.total_institutions} funded radiology departments • Source: Blue Ridge Institute for Medical Research FY2025`;
            
            const rankings = nihSubspecData.rankings['funding'];
            let html = `
                <table class="rankings-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Institution</th>
                            <th>BRIMR Rank</th>
                            <th>NIH Funding ($)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            rankings.forEach((row, index) => {
                const rank = index + 1;
                const institution = row[0];
                const value = row[1];
                
                let rankClass = '';
                let badgeHtml = rank;
                if (rank === 1) { rankClass = 'rank-1'; badgeHtml = '<span class="top-badge badge-gold">1</span>'; }
                else if (rank === 2) { rankClass = 'rank-2'; badgeHtml = '<span class="top-badge badge-silver">2</span>'; }
                else if (rank === 3) { rankClass = 'rank-3'; badgeHtml = '<span class="top-badge badge-bronze">3</span>'; }
                
                html += `
                    <tr>
                        <td class="rank-cell ${rankClass}">${badgeHtml}</td>
                        <td class="institution-name">${institution}</td>
                        <td class="faculty-count">BRIMR #${rank}</td>
                        <td class="metric-value">$${parseInt(value).toLocaleString()}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            
            // Add excluded institutions note
            if (typeof NIH_EXCLUDED !== 'undefined') {
                html += '<div class="nih-note">';
                html += '<strong>⚠️ Excluded from BRIMR rankings:</strong> ';
                var excParts = [];
                Object.keys(NIH_EXCLUDED).forEach(function(name) {
                    excParts.push(name + ' (' + NIH_EXCLUDED[name] + ')');
                });
                html += excParts.join('; ');
                html += '</div>';
            }
            
            resultsContent.innerHTML = html;
            return;
        }
        
        const subspecData = DATA[subspecialty];
        if (!subspecData) {
            resultsContent.innerHTML = '<div class="no-data"><div class="icon">❌</div><p>No data available</p></div>';
            return;
        }
        
        const badgeClass = subspecialtyBadges[subspecialty] || '';
        
        // Handle "all" metrics view
        if (metric === 'all') {
            resultsTitle.innerHTML = `All Metrics <span class="subspecialty-badge ${badgeClass}">${subspecialty}</span>`;
            resultsInfo.textContent = `${subspecData.total_faculty ? subspecData.total_faculty + ' faculty • ' : ''}${subspecData.total_institutions} institutions • Papers/Faculty and H-index metrics require min. 3 faculty`;
            
            const allMetrics = subspecialty === 'NIH Funding' ? ['funding'] : ['papers', 'citations', 'papers_per_faculty', 'mean_h', 'median_h'];
            let html = '<div class="all-metrics-grid">';
            
            allMetrics.forEach(m => {
                const rankings = subspecData.rankings[m];
                if (!rankings || rankings.length === 0) return;
                
                html += `<div class="metric-card"><h3>${metricLabels[m]}</h3>`;
                html += `<table class="rankings-table"><thead><tr><th>Rank</th><th>Institution</th><th>Faculty</th><th>Value</th></tr></thead><tbody>`;
                
                rankings.forEach((row, index) => {
                    const rank = index + 1;
                    const institution = row[0];
                    const value = row[1];
                    const faculty = row[2];
                    
                    let rankClass = '';
                    let badgeHtml = rank;
                    if (rank === 1) {
                        rankClass = 'rank-1';
                        badgeHtml = '<span class="top-badge badge-gold">1</span>';
                    } else if (rank === 2) {
                        rankClass = 'rank-2';
                        badgeHtml = '<span class="top-badge badge-silver">2</span>';
                    } else if (rank === 3) {
                        rankClass = 'rank-3';
                        badgeHtml = '<span class="top-badge badge-bronze">3</span>';
                    }
                    
                    html += `<tr><td class="rank-cell ${rankClass}">${badgeHtml}</td><td class="institution-name">${institution}</td><td class="faculty-count">${subspecialty === "NIH Funding" ? "BRIMR #" + (index+1) : "n=" + parseInt(faculty)}</td><td class="metric-value">${formatValue(value, m)}</td></tr>`;
                });
                
                html += '</tbody></table></div>';
            });
            
            html += '</div>';
            resultsContent.innerHTML = html;
            return;
        }
        
        // Single metric view (original behavior)
        const rankings = subspecData.rankings[metric];
        if (!rankings || rankings.length === 0) {
            resultsContent.innerHTML = '<div class="no-data"><div class="icon">📭</div><p>No rankings available for this metric</p></div>';
            return;
        }
        
        resultsTitle.innerHTML = `Top 25 by ${metricLabels[metric]} <span class="subspecialty-badge ${badgeClass}">${subspecialty}</span>`;
        
        const minFacultyNote = (metric === 'papers_per_faculty' || metric === 'mean_h' || metric === 'median_h') 
            ? ' (min. 3 faculty)' : '';
        resultsInfo.textContent = `${subspecData.total_faculty ? subspecData.total_faculty + ' faculty • ' : ''}${subspecData.total_institutions} institutions${minFacultyNote}`;
        
        let html = `
            <table class="rankings-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Institution</th>
                        <th>${subspecialty === "NIH Funding" ? "BRIMR Rank" : "Faculty"}</th>
                        <th>${subspecialty === "NIH Funding" ? "NIH Funding ($)" : metricLabels[metric]}</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        rankings.forEach((row, index) => {
            const rank = index + 1;
            const institution = row[0];
            const value = row[1];
            const faculty = row[2];
            
            let rankClass = '';
            let badgeHtml = rank;
            if (rank === 1) {
                rankClass = 'rank-1';
                badgeHtml = '<span class="top-badge badge-gold">1</span>';
            } else if (rank === 2) {
                rankClass = 'rank-2';
                badgeHtml = '<span class="top-badge badge-silver">2</span>';
            } else if (rank === 3) {
                rankClass = 'rank-3';
                badgeHtml = '<span class="top-badge badge-bronze">3</span>';
            }
            
            html += `
                <tr>
                    <td class="rank-cell ${rankClass}">${badgeHtml}</td>
                    <td class="institution-name">${institution}</td>
                    <td class="faculty-count">${subspecialty === "NIH Funding" ? "BRIMR #" + (index+1) : "n=" + parseInt(faculty)}</td>
                    <td class="metric-value">${formatValue(value, metric)}</td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        
        // Add excluded institutions note for NIH Funding
        if (subspecialty === 'NIH Funding' && typeof NIH_EXCLUDED !== 'undefined') {
            html += '<div class="nih-note">';
            html += '<strong>⚠️ Excluded from BRIMR rankings:</strong> ';
            var excNames = Object.keys(NIH_EXCLUDED);
            var excParts = [];
            excNames.forEach(function(name) {
                excParts.push(name + ' (' + NIH_EXCLUDED[name] + ')');
            });
            html += excParts.join('; ');
            html += '</div>';
        }
        
        resultsContent.innerHTML = html;
    }
    
    // Initial load
    updateResults();
    </script>
</body>
</html>
